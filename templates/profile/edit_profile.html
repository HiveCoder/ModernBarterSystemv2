{% extends 'base.html' %}
{% block title %}Edit Profile — SilkTrade{% endblock %}
{% block content %}
<div class="container form-page">
  <div class="form-card">
    <div class="form-card-header">
      <h2><i class="fa-solid fa-user-pen"></i> Edit Profile</h2>
    </div>
    <form method="POST" enctype="multipart/form-data">
      <div class="profile-avatar-edit">
        <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}" id="avatarPreview" alt="Avatar"/>
        <label class="avatar-upload-label">
          <i class="fa-solid fa-camera"></i> Change Photo
          <input type="file" name="avatar" accept=".png,.jpg,.jpeg,.gif,.webp" hidden id="avatarInput"/>
        </label>
      </div>
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" name="display_name" value="{{ current_user.display_name or '' }}" maxlength="60"/>
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" rows="3" placeholder="Tell the community about yourself and what you like to trade…">{{ current_user.bio or '' }}</textarea>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" name="location" value="{{ current_user.location or '' }}" placeholder="City, Country"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" value="{{ current_user.username }}" disabled/>
        <small>Username cannot be changed.</small>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('profile.user_profile', username=current_user.username) }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
      </div>
    </form>
  </div>
</div>
<script>
document.getElementById('avatarInput').addEventListener('change', function() {
  const reader = new FileReader();
  reader.onload = e => document.getElementById('avatarPreview').src = e.target.result;
  reader.readAsDataURL(this.files[0]);
});
</script>
{% endblock %}
